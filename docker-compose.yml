services:
  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      # - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  auth:
    image: python:3.11-slim
    container_name: auth
    working_dir: /app
    volumes:
      - ./auth:/app
    ports:
      - "8000:8000"
    command: sh -c "pip install -r requirements.txt --break-system-packages && python manage.py runserver 0.0.0.0:8000"

  scraper:
    image: python:3.11-slim
    container_name: scraper
    working_dir: /app
    volumes:
      - ./scraper:/app
    ports:
      - "8001:8001"
    environment:
      - PIP_CACHE_DIR=/tmp/pip-cache
    command: sh -c "pip install -r requirements.txt --break-system-packages && uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
